```
<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow">

            <div class="card-header bg-warning text-dark">
                <h3 class="mb-0">Recuperar Contraseña</h3>
            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">
                            Correo Electrónico
                        </label>

                        <input
                            type="email"
                            name="correo"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Contraseña Actual
                        </label>

                        <input
                            type="password"
                            name="password_actual"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Nueva Contraseña
                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Confirmar Contraseña
                        </label>

                        <input
                            type="password"
                            name="confirmar"
                            class="form-control"
                            required>
                    </div>

                    <div class="d-grid">

                        <button
                            type="submit"
                            class="btn btn-warning">

                            Actualizar Contraseña

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</div>

</body>
</html>
