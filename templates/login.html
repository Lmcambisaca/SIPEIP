<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login SIPEIP</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body{
        background-color:#f8f9fa;
    }

    .login-card{
        margin-top:80px;
    }

    .imagen-login{
        object-fit:cover;
        height:100%;
    }
</style>


</head>

<body>

<div class="container">


<div class="row justify-content-center login-card">

    <div class="col-lg-8">

        <div class="card shadow">

            <div class="row g-0">

                <div class="col-lg-4 d-none d-lg-block">

                    <img
                        src="https://images.unsplash.com/photo-1454165804606-c3d57bc86b40"
                        class="img-fluid h-100 imagen-login"
                        alt="SIPEIP">

                </div>

                <div class="col-lg-8">

                    <div class="card-body p-5">

                        <h2 class="text-center mb-4">
                            Inicio de Sesión
                        </h2>

                        <form method="POST">

                            <div class="mb-3">

                                <label class="form-label">
                                    Correo Electrónico
                                </label>

                                <input
                                    type="email"
                                    name="correo"
                                    class="form-control"
                                    required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Contraseña
                                </label>

                                <input
                                    type="password"
                                    name="password"
                                    class="form-control"
                                    required>

                            </div>

                            <div class="d-grid">

                                <button
                                    type="submit"
                                    class="btn btn-primary">

                                    Ingresar

                                </button>

                            </div>

                            <div class="text-center mt-3">

                                <a href="/recuperar_password">
                                    ¿Olvidó su contraseña?
                                </a>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>


</div>

</body>
</html>
