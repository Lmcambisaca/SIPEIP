<!DOCTYPE html>
<html>
<head>
    <title>Editar Rol</title>
</head>
<body>

<h1>Editar Rol</h1>

<form method="POST">

    <label>Nombre del Rol:</label>
    <input type="text" name="nombre_rol"
           value="{{ rol[1] }}" required>

    <br><br>

    <label>Descripción:</label>
    <input type="text" name="descripcion"
           value="{{ rol[2] }}" required>

    <br><br>

    <button type="submit">
        Actualizar Rol
    </button>

</form>

</body>
</html>
