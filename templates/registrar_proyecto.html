<!DOCTYPE html>
<html>

<head>

    <title>Registrar Proyecto</title>

    <link href="{{ url_for('static', filename='css/sb-admin-2.min.css') }}" rel="stylesheet">

</head>

<body class="container mt-5">

<h2>Registrar Proyecto</h2>

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label>Código</label>

<input
type="text"
name="codigo"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Nombre</label>

<input
type="text"
name="nombre"
class="form-control"
required>

</div>

</div>

<div class="mb-3">

<label>Descripción</label>

<textarea
name="descripcion"
class="form-control"
required></textarea>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>Responsable</label>

<input
type="text"
name="responsable"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Presupuesto</label>

<input
type="number"
step="0.01"
name="presupuesto"
class="form-control"
required>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>Fecha Inicio</label>

<input
type="date"
name="fecha_inicio"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Fecha Fin</label>

<input
type="date"
name="fecha_fin"
class="form-control"
required>

</div>

</div>

<div class="mb-3">

<label>Planificación</label>

<select
name="id_planificacion"
class="form-control">

{% for p in planificaciones %}

<option value="{{ p[0] }}">

{{ p[1] }}

</option>

{% endfor %}

</select>

</div>

<button class="btn btn-primary">

Registrar Proyecto

</button>

</form>

</body>

</html>
